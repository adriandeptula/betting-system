name: Daily Data Fetch

on:
  schedule:
    # Codziennie o 6:00 UTC (7:00 CET / 8:00 CEST)
    - cron: '0 6 * * *'
  # Ręczny trigger – przydatny do testów i napraw
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and odds
        env:
          ODDS_API_KEY:     ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python main.py fetch

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/odds/
          git diff --staged --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push
