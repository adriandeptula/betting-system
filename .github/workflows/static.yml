name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase credentials into supabase-client.js
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Struktura plików w repozytorium:"
          ls -R
          
          # To polecenie automatycznie znajdzie plik i podstawi dane, 
          # niezależnie od tego, w jakim folderze on siedzi:
          find . -name "supabase-client.js" -exec sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" {} +
          find . -name "supabase-client.js" -exec sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" {} +
          
          echo "✅ Gotowe"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './webapp'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
