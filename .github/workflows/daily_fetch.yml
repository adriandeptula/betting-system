name: Daily Data Fetch

on:
  schedule:
    # Codziennie o 6:00 UTC (7:00 CET / 8:00 CEST)
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: data-write
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and odds
        env:
          ODDS_API_KEY:   ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_2: ${{ secrets.ODDS_API_KEY_2 }}
          ODDS_API_KEY_3: ${{ secrets.ODDS_API_KEY_3 }}
          BANKROLL:       ${{ secrets.BANKROLL }}
        run: python main.py fetch

      # ── Auto-rozliczanie PENDING kuponów po świeżych danych ──────────────
      # Uruchamiane od razu po fetch – świeże kursy i wyniki zwiększają
      # szansę na poprawne dopasowanie zakończonych meczów.
      - name: Auto-resolve pending coupons
        env:
          ODDS_API_KEY:     ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_2:   ${{ secrets.ODDS_API_KEY_2 }}
          ODDS_API_KEY_3:   ${{ secrets.ODDS_API_KEY_3 }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL:         ${{ secrets.BANKROLL }}
          WEBAPP_URL:       ${{ secrets.WEBAPP_URL }}
        run: python main.py resolve

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/ data/odds/ data/results/
          git diff --staged --quiet || git commit -m "data: update + resolve $(date +'%Y-%m-%d')"
          git push
