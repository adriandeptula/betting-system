name: Generate Coupons

on:
  schedule:
    # Środa 09:00 UTC (10:00 CET) – kupony na środkowe mecze
    - cron: '0 9 * * 3'
    # Piątek 09:00 UTC (10:00 CET) – kupony weekendowe
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send coupons
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          ODDS_API_KEY_2:       ${{ secrets.ODDS_API_KEY_2 }}
          ODDS_API_KEY_3:       ${{ secrets.ODDS_API_KEY_3 }}
          API_FOOTBALL_KEY:     ${{ secrets.API_FOOTBALL_KEY }}
          API_FOOTBALL_KEY_2:   ${{ secrets.API_FOOTBALL_KEY_2 }}
          API_FOOTBALL_KEY_3:   ${{ secrets.API_FOOTBALL_KEY_3 }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          BANKROLL:             ${{ secrets.BANKROLL }}
        run: python main.py coupon

      - name: Save coupon history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/
          git diff --staged --quiet || git commit -m "results: coupons $(date +'%Y-%m-%d')"
          git push
